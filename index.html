<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>CSS selector</title>
  </head>
  <body>
    <h1 id="line-1">Tiêu đề</h1>
    <h2 id="line-2">Tiêu đề cấp 2</h2>
    <p class="cau-van">Đây là một đoạn văn bản.</p>
    <p class="cau-van cau-van-2">Đây là một đoạn văn bản khác.</p>
    <ul class="danh-sach">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
    <!-- combinators selector -->
    <h3 class="tieu-de-nho">tiêu đề nhỏ 1</h3>
    <h3 class="tieu-de-nho">tiêu đề nhỏ 2</h3>
    <h3>tiêu đề nhỏ 3</h3>
    <h3>tiêu đề nhỏ 4</h3>
    <h3>tiêu đề nhỏ 5</h3>
    <p>đoạn văn 1</p>
    <p>đoạn văn 2</p>
    <p>đoạn văn 3</p>
    <ul>
      <li>Nội dung 1</li>
      <li>Nội dung 2</li>
      <li>Nội dung 3</li>
    </ul>
  </body>
</html>
